<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Boletins — FISK</title>
<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#161414">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23161414'/%3E%3Ctext x='16' y='23' font-family='Arial, Helvetica, sans-serif' font-size='19' font-weight='800' fill='%23d81f26' text-anchor='middle'%3EF%3C/text%3E%3C/svg%3E">
</head>
<body>

  <header class="hero">
    <a class="back-link" href="index.html">&larr; Voltar aos recursos</a>
    <h1>Gerador de Boletins</h1>
    <p>Escolha o tipo de boletim que você quer montar</p>
  </header>

  <main class="grid">

    <a class="card card-kids" href="https://pedro-fisk.github.io/boletim-fisk/kids.html" target="_blank" rel="noopener">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 9V6.5a5 5 0 0110 0V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <rect x="4.5" y="9" width="15" height="12" rx="2.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M9 9v2.2a1 1 0 001 1h4a1 1 0 001-1V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M9 15.5h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h2>Boletim Kids e Teens</h2>
      <p>Para turmas infantis e adolescentes</p>
    </a>

    <a class="card card-adults" href="https://pedro-fisk.github.io/boletim-fisk/" target="_blank" rel="noopener">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 7V5.5a1.5 1.5 0 011.5-1.5h3A1.5 1.5 0 0115 5.5V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <rect x="3.5" y="7" width="17" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M3.5 13h17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h2>Boletim de Jovens e Adultos</h2>
      <p>Monte boletins dos alunos rapidamente</p>
    </a>

    <a class="card card-spanish" href="https://pedro-fisk.github.io/boletim-fisk/espanhol.html" target="_blank" rel="noopener">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.5"/>
          <ellipse cx="12" cy="12" rx="3.6" ry="8.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M3.7 9.5h16.6M3.7 14.5h16.6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h2>Boletim de Espanhol</h2>
      <p>Para turmas de espanhol</p>
    </a>

  </main>

  <footer>
    <p>Feito para professores FISK</p>
  </footer>

</body>
</html>
